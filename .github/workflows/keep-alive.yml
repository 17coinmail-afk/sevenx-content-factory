name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sevenx-content-factory.onrender.com/health)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || echo "Service returned $STATUS"
